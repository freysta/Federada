version: '3.8'

services:
  # Banco de Dados (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: federada-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-federada}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-federada_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - federada-network

  # Backend (NestJS)
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: federada-api
    restart: always
    expose:
      - "3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL:-postgresql://federada:postgres@db:5432/federada_db}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://federada.com.br}
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./server/data:/app/data
      - ./server/uploads:/app/uploads
    networks:
      - federada-network

  # Frontend (React + Nginx)
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8080/api}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: federada-web
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    networks:
      - federada-network

  # Reverse Proxy & SSL (Caddy managed via Cloudflare)
  caddy:
    image: caddy:2-alpine
    container_name: federada-caddy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - federada-network

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  federada-network:
    driver: bridge
